[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-prophet-core"
version = "0.1.3"
description = "AI Prophet, utils, types and HTTP client"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "AI Prophet Team"}]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "jsonschema>=4.0",
    "python-dotenv>=1.0.0",
    "sqlalchemy>=2.0.0",
    "requests>=2.31.0",
    "cryptography>=43.0.0",
]

[project.optional-dependencies]
mcp = ["fastmcp>=3.0"]

[project.scripts]
prophet-mcp = "ai_prophet_core.mcp_server:main"

[project.urls]
Homepage = "https://www.prophetarena.co"
Documentation = "https://www.prophetarena.co"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_prophet_core*"]

[tool.setuptools.package-data]
"ai_prophet_core" = ["py.typed"]
"ai_prophet_core.schemas" = ["*.schema.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
